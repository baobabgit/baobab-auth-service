name: Release

# Déclenché uniquement par un tag vX.Y.Z créé sur main par le Release Manager.
# Ce workflow ne réexécute PAS les contrôles de ci.yml : il vérifie que le
# commit taggé porte déjà une CI verte, puis publie.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate-tag:
    name: Valider le tag et la CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Vérifier le format du tag (vX.Y.Z strict)
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag invalide : $GITHUB_REF_NAME (attendu : vX.Y.Z)"
            exit 1
          fi
          echo "Tag valide : $GITHUB_REF_NAME"
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: Vérifier la cohérence version tag ↔ pyproject.toml
        run: |
          PKG_VERSION=$(uv run python -c "
          import importlib.metadata; print(importlib.metadata.version('example-package'))
          ")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERREUR : version tag ($TAG_VERSION) ≠ version package ($PKG_VERSION)"
            exit 1
          fi
          echo "Versions cohérentes : $PKG_VERSION"
      - name: Vérifier la présence dans CHANGELOG
        run: |
          if ! grep -q "\[${GITHUB_REF_NAME#v}\]" CHANGELOG.md; then
            echo "ERREUR : version ${GITHUB_REF_NAME#v} absente du CHANGELOG.md"
            exit 1
          fi

  build:
    name: Build + vérification distribution
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: Build sdist + wheel
        run: uv build
      - name: Twine check
        run: uv run twine check dist/*
      - name: Attestation de provenance (supply chain)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publier sur PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Créer la GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          body: "Voir [CHANGELOG.md](CHANGELOG.md) pour le détail des changements."
