name: CI

# Pour suspendre la CI sans toucher au code (quota de minutes épuisé) :
#   GitHub → Settings → Variables → Actions → CI_ENABLED = false
# Pour réactiver :
#   Remettre CI_ENABLED = true (ou supprimer la variable), puis déclencher
#   manuellement via l'onglet Actions → "Run workflow".
#
# Comportement par défaut (variable absente) : CI s'exécute normalement.

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Qualité + Typage + Sécurité
    runs-on: ubuntu-latest
    if: vars.CI_ENABLED != 'false'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: Black (format check)
        run: uv run black --check src tests
      - name: Ruff (lint)
        run: uv run ruff check src tests
      - name: Mypy (typage strict)
        run: uv run mypy src
      - name: Bandit (SARIF)
        run: uv run bandit -c pyproject.toml -r src -f sarif -o bandit.sarif
        continue-on-error: true
      - name: Publier SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
      - name: Bandit (gate)
        run: uv run bandit -c pyproject.toml -r src
      - name: uv audit (vulnérabilités des dépendances)
        run: uv audit

  tests:
    name: Tests + couverture ≥ 95 %
    runs-on: ubuntu-latest
    if: vars.CI_ENABLED != 'false'
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: pytest
        run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=95 --junitxml=junit.xml
      - name: Upload rapports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            junit.xml
            coverage.xml
          retention-days: 14

  commit-policy:
    name: Politique de commit (anti-attribution IA)
    runs-on: ubuntu-latest
    if: vars.CI_ENABLED != 'false' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Vérifier les messages de commit
        run: |
          git log origin/${{ github.base_ref }}..HEAD --format='%B' \
            > /tmp/pr_commits.txt
          python scripts/check_no_ai_attribution.py /tmp/pr_commits.txt

  traceability:
    name: Traçabilité (specs → backlog → runs)
    runs-on: ubuntu-latest
    if: vars.CI_ENABLED != 'false'
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: Vérifier la traçabilité
        run: uv run python scripts/check_traceability.py

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [checks, tests]
    if: vars.CI_ENABLED != 'false'
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: Build (sdist + wheel)
        run: uv build
      - name: Twine check
        run: uv run twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist-ci
          path: dist/
          retention-days: 7
